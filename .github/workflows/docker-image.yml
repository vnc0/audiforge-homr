name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build ./...

  docker:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name (GHCR requires lowercase)
        id: image_name
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build image (${{ matrix.platform }})
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.image_name.outputs.name }}:${{ github.sha }}-${{ matrix.suffix }}

  merge:
    if: github.event_name != 'pull_request'
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name (GHCR requires lowercase)
        id: image_name
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifest (sha)
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${{ github.sha }}" \
            "${IMAGE_NAME}:${{ github.sha }}-amd64" \
            "${IMAGE_NAME}:${{ github.sha }}-arm64"
        env:
          IMAGE_NAME: ${{ steps.image_name.outputs.name }}

      - name: Create multi-arch manifest (version + latest)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${{ github.ref_name }}" \
            -t "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:${{ github.sha }}-amd64" \
            "${IMAGE_NAME}:${{ github.sha }}-arm64"
        env:
          IMAGE_NAME: ${{ steps.image_name.outputs.name }}
